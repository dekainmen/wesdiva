<!DOCTYPE html>
<html>
<head>
  <title>WesDiva MODERN LUXURY</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          brand: {
            bg: "#FFFFFF",
            cream: "#F8F8F8",
            pink: "#E91E63",
            purple: "#9C27B0",
            green: "#4CAF50",
            dark: "#333333",
            charcoal: "#1A1A1A",
            border: "#E0E0E0"
          }
        }
      }
    }
  }
  </script>
</head>

<body class="bg-brand-bg text-brand-dark">

<!-- ================= HEADER ================= -->
<header class="bg-brand-charcoal text-white">

  <div class="
    max-w-7xl mx-auto
    flex items-center
    justify-between
    px-8 py-4
  ">

    <a href="/"
      class="text-2xl font-bold tracking-wider" style="background: linear-gradient(45deg, #E91E63, #9C27B0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
      WesDiva
      <span class="text-black text-lg font-light">MODERN LUXURY</span>
    </a>

    <nav class="
      hidden md:flex
      space-x-8
      text-sm font-medium
    ">
      <a href="/category.html?cat=Clothing">Clothing</a>
      <a href="/category.html?cat=Ethnics">Ethnics</a>
      <a href="/category.html?cat=Footwear">Footwear</a>
      <a href="/category.html?cat=Grooming">Grooming</a>
      <a href="/category.html?cat=Watches">Watches</a>
      <a href="/category.html?cat=Accessories">Accessories</a>
    </nav>

    <a href="/cart.html"
      class="border px-4 py-2 rounded-lg">
      Cart 🛒
    </a>

  </div>

</header>


<!-- ================= HERO BANNER ================= -->
<section class="relative">

  <img
    src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d"
    class="w-full h-[500px] object-cover"
  />

  <div class="
    absolute inset-0
    bg-black/40
    flex flex-col
    items-center
    justify-center
    text-white
    text-center
  ">

    <h1 class="
      text-5xl font-light
      mb-4
    ">
      Elevate Your Elegance
    </h1>

    <p class="mb-6 text-lg">
      Premium fashion curated for modern women
    </p>

    <a href="/category.html?cat=Clothing"
      class="
        bg-white text-black
        px-6 py-3
        rounded-lg
        font-medium
      ">
      Shop Now
    </a>

  </div>

</section>

<!-- ================= CATEGORY GRID ================= -->
<section class="
  max-w-7xl mx-auto
  px-8 py-16
">

  <h2 class="
    text-2xl font-light
    mb-10
  ">
    Shop by Category
  </h2>

  <div class="
    grid grid-cols-2
    md:grid-cols-3
    lg:grid-cols-6
    gap-6
  ">

<!-- Category Card -->
    <a href="/category.html?cat=Clothing"
      class="category-card">

      <img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f"/>

      <span>Clothing</span>
    </a>

    <a href="/category.html?cat=Footwear"
      class="category-card">

      <img src="https://images.unsplash.com/photo-1543163521-1bf539c55dd2"/>

      <span>Footwear</span>
    </a>

    <a href="/category.html?cat=Jewellery"
      class="category-card">

      <img src="https://images.unsplash.com/photo-1602751584552-8ba73aad10e1"/>

      <span>Jewellery</span>
    </a>

    <a href="/category.html?cat=Accessories"
      class="category-card">

      <img src="https://images.unsplash.com/photo-1590874103328-eac38a683ce7"/>

      <span>Accessories</span>
    </a>

  </div>

</section>

<!-- ================= FEATURED ================= -->
<section class="
  max-w-7xl mx-auto
  px-8 pb-20
">

  <h2 class="
    text-2xl font-light
    mb-10
  ">
    Featured Products
  </h2>

  <div id="featured"
    class="
      grid grid-cols-1
      md:grid-cols-2
      lg:grid-cols-4
      gap-6
    ">
  </div>

</section>


<style>

.category-card {
  background: white;
  border-radius: 12px;
  overflow: hidden;
  text-align: center;
  border: 1px solid #D6CFC7;
  transition: .3s;
}

.category-card img {
  height: 150px;
  width: 100%;
  object-fit: cover;
}

.category-card span {
  display: block;
  padding: 12px;
  font-weight: 500;
}

.category-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 10px 20px rgba(0,0,0,.08);
}

</style>


<script>

/**
 * Load featured products
 * (first 8 for now)
 */
async function loadFeatured() {

  const res =
    await fetch("/api/products");

  const products =
    await res.json();

  const featured =
    products.slice(0, 8);

  const container =
    document.getElementById(
      "featured"
    );

  featured.forEach(p => {

    container.innerHTML += `
      <div class="
        bg-white
        p-4
        rounded-xl
        border
      ">

        <img src="${p.image}"
          class="h-40 w-full
                 object-cover
                 rounded mb-3">

        <h3>${p.name}</h3>

        <p class="text-brand-pink">
          ₹${p.price}
        </p>

      </div>
    `;
  });
}

loadFeatured();

</script>

</body>
</html>
